<script>
    window.addEventListener('load', function() {
    (function(){
      const wrap = document.getElementById('ccw-wrap-iu');
      const center = document.getElementById('ccw-center-iu');
      const centerTitle = document.getElementById('ccw-center-title-iu');
      const centerImg = document.getElementById('ccw-center-img-iu');
      const centerText = document.getElementById('ccw-center-text-iu');
      const smalls = Array.from(wrap.querySelectorAll('.ccw-small-iu'));

        function positionSmalls(){
        const wrapW = wrap.clientWidth;
        const wrapH = wrap.clientHeight;
        
        wrap.style.height = wrap.clientWidth + 'px';
        
        let orbit;
        if (window.innerWidth <= 390) {
            orbit = Math.min(wrapW, wrapH) / 2 + 8; 
        } else if (window.innerWidth <= 520) {
            orbit = Math.min(wrapW, wrapH) / 2 + 15;
        } else {
            orbit = Math.min(wrapW, wrapH) / 2 - 20;
        }

        smalls.forEach((el, i) => {
            const angle = (i / smalls.length) * Math.PI * 2 - Math.PI/2;
            const x = (wrapW / 2) + orbit * Math.cos(angle);
            const y = (wrapH / 2) + orbit * Math.sin(angle);
            el.style.left = `${x - el.clientWidth / 2}px`;
            el.style.top = `${y - el.clientHeight / 2}px`;
        });
        }

      positionSmalls();

      function activate(target){
        smalls.forEach(s => s.classList.remove('active'));
        target.classList.add('active');

        const imgUrl = target.dataset.img;
        const title = target.dataset.title;
        const text = target.dataset.text;

        if(imgUrl){
          centerImg.src = imgUrl;
          centerImg.style.display = 'block';
        }
        centerTitle.textContent = title;
        centerText.textContent = text;
        centerText.style.display = 'block';
      }

      smalls.forEach(s => {
        s.innerHTML = `
          <div class="ccw-dot-iu"><img src="${s.dataset.img}" alt=""></div>
          <div class="ccw-label-iu">${s.dataset.title}</div>
        `;
        s.addEventListener('click', () => activate(s));
      });

      centerImg.style.display = 'none';
      centerText.style.display = 'none';

      wrap.addEventListener('click', (e) => {
        if (!e.target.closest('.ccw-small-iu')) {

          smalls.forEach(s => s.classList.remove('active'));
          centerTitle.textContent = "Tefal Morning Ekmek Kızartma Makinesi";
          centerImg.style.display = 'none';
          centerText.style.display = 'none';
        }
      });

      window.addEventListener('resize', () => {
        positionSmalls();
        const active = smalls.find(s => s.classList.contains('active'));
        if(active) activate(active);
      });
    })();
  });
  </script></div>
