<style>

.product-slider-wrapper-iu * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

.product-slider-wrapper-iu {
  position: relative;
  z-index: 1; 
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  user-select: none;
  padding: 0px 20px;
}

.header-iu {
  text-align: center;
  margin-bottom: 20px;
}

.subtitle-iu {
  color: #EC6907;
  font-size: 16px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
}

.main-title-iu {
  font-size: clamp(36px, 5vw, 56px);
  font-weight: 900;
  color: #3a3e54;
  line-height: 1.1;
  margin-bottom: 16px;
  margin-top: 16px;
}

.product-slider-iu {
  perspective: 1500px;
  perspective-origin: 50% 50%;
  cursor: grab;
  width: 100%;
  max-width: 1200px;
  overflow: hidden;
}

.product-slider-iu.dragging-iu {
  cursor: grabbing;
}

.product-carousel-iu {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transform-style: preserve-3d;
  transition: transform 0.5s ease, filter 0.5s ease, height 0.5s ease;
}

.product-card-iu {
  flex-shrink: 0;
  width: 280px;
  aspect-ratio: 1 / 1;
  background: white;
  overflow: hidden;
  transform-style: preserve-3d;
  position: relative;
  cursor: pointer;
  border-radius: 10px;
  transition: transform 0.5s ease, opacity 0.5s ease;
  will-change: transform, opacity; 
}

.product-card-iu::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(to right, rgba(0, 0, 0, 0.15), transparent 30%, transparent 70%, rgba(0, 0, 0, 0.15));
  transform: translateZ(-8px);
  pointer-events: none;
  border-radius: inherit;
}

.product-card-iu img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  position: relative;
  z-index: 1;
  border-radius: inherit;
}

.hover-overlay-iu {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.3s ease;
  z-index: 2;
  border-radius: inherit;
}

.product-card-iu:hover .hover-overlay-iu {
  opacity: 1;
}

.hover-overlay-iu span {
  color: white;
  font-size: 16px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.product-carousel-iu.blurred-iu .product-card-iu:not(.expanded-iu) {
  filter: blur(8px);
  transition: filter 0.6s ease;
}

.product-card-iu.expanded-iu {
  z-index: 1000 !important;
}

.product-details-iu {
  position: absolute; 
  top: 78%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.6s ease;
  z-index: 10;
  max-width: 600px;
  padding: 1.5rem;
  background: rgba(236, 105, 7, 0.9);
  color: #000;
  box-shadow: 4px 3px 18px 4px #b7b7b721;
  border-radius: 12px;
}

.product-details-iu.visible-iu {
  opacity: 1;
  pointer-events: all;
}

.product-details-iu h2 {
  font-size: 28px;
  font-weight: 900;
  color: #0a0a0a;
  margin-bottom: 12px;
}

.product-details-iu p {
  font-size: 18px;
  color: #080808;
  line-height: 1.7;
}

.product-close-btn-iu {
  position: absolute;
  top: 100px;       
  right: 200px;    
  width: 48px;
  height: 48px;
  background: white;
  border: none;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 1000;
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
}


.product-close-btn-iu.visible-iu {
  opacity: 1;
  pointer-events: all;
}

.product-close-btn-iu:hover {
  background: #EC6907;
  color: white;
  transform: rotate(90deg) scale(1.1);
}

.product-close-btn-iu svg {
  width: 24px;
  height: 24px;
}

.product-card-iu.expanded-iu .hover-overlay-iu {
  display: none;
}

.clone-iu {
  position: absolute; 
  z-index: 6;
  border-radius: 12px;
  transform-origin: center center;
  transition: all 0.5s ease;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  max-width: 500px;
  max-height: 500px;
}

.video-wrapper-iu {
  width: 100%;
  max-width: 600px; 
  margin: 40px 0;
  overflow: hidden;
  border-radius: 12px;
}

.video-wrapper-iu video {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 12px;
  object-fit: cover;
}

@media (max-width: 768px) {

  .product-slider-wrapper-iu {
    padding: 0 10px;
    min-height: 60vh;
  }

  .main-title-iu {
    font-size: clamp(24px, 6vw, 36px);
  }

  .subtitle-iu {
    font-size: 14px;
  }

  .product-slider-iu {
    max-width: 100%;
    perspective: 600px; 
  }

  .product-carousel-iu {
    gap: 12px;
    transform-style: preserve-3d;
    justify-content: center;
  }

  .product-card-iu {
    width: 90px; 
    aspect-ratio: 1/1;
  }

  .clone-iu {
    max-width: 90vw;
    max-height: 90vw;
  }

  .product-details-iu {
    position: relative;
    top: 75%;
    padding: 0.8rem !important;
    font-size: 12px !important;
    max-width: 90vw;
    margin-top: 120px;
  }

  .product-details-iu h2 {
    font-size: 14px !important; 
  }

  .product-close-btn-iu {
    top: 10px;
    right: 10px;
    width: 40px;
    height: 40px;
  }

  .video-wrapper-iu {
    max-width: 100%; 
    margin: 20px 0;
  }

  .video-wrapper-iu iframe, 
  .video-wrapper-iu video {
    width: 100%;
    height: auto;
  }
}

</style>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const container = document.getElementById("productSlider-iu");
  const carousel = document.getElementById("productCarousel-iu");
  const cards = Array.from(document.querySelectorAll(".product-card-iu"));
  const details = document.getElementById("productDetails-iu");
  const title = document.getElementById("productTitle-iu");
  const desc = document.getElementById("productDesc-iu");
  const closeBtn = document.getElementById("productCloseBtn-iu");

  let expanded = null;
  let startX = 0;
  let startY = 0;
  let dragging = false;
  let dragDistance = 0;
  const threshold = 60;
  let isHorizontalSwipe = false;
  const isMobile = window.innerWidth <= 768;

  function applyPositions() {
    if (isMobile) {

      const positions = [
        { z: 100, rotateY: 20, scale: 0.9 },
        { z: 50, rotateY: 10, scale: 0.95 },
        { z: 0, rotateY: 0, scale: 1 },
        { z: 0, rotateY: 0, scale: 1 },
        { z: 0, rotateY: 0, scale: 1 },
        { z: 50, rotateY: -10, scale: 0.95 },
        { z: 100, rotateY: -20, scale: 0.9 },
        { z: 150, rotateY: -30, scale: 0.85 }
      ];

      cards.forEach((card, i) => {
        const p = positions[i] || positions[positions.length - 1];
        card.style.transform = `translateZ(${p.z}px) rotateY(${p.rotateY}deg) scale(${p.scale})`;
      });
    } else {
      const positions = [
        { z: 150, rotateY: 40, scale: 0.9 },
        { z: 100, rotateY: 25, scale: 0.95 },
        { z: 50, rotateY: 10, scale: 1 },
        { z: 0, rotateY: 0, scale: 1 },
        { z: 50, rotateY: -10, scale: 1 },
        { z: 100, rotateY: -25, scale: 0.95 },
        { z: 150, rotateY: -40, scale: 0.9 },
        { z: 200, rotateY: -55, scale: 0.85 }
      ];

      cards.forEach((card, i) => {
        const p = positions[i] || positions[positions.length - 1];
        card.style.transform = `translateZ(${p.z}px) rotateY(${p.rotateY}deg) scale(${p.scale})`;
      });
    }
  }

  applyPositions();

  details.style.left = "50%";
  details.style.transform = "translateX(-50%)";

  function expandCard(card) {
    if (expanded) return;
    expanded = card;

    card.classList.add("expanded-iu");

    title.textContent = card.dataset.title;
    desc.textContent = card.dataset.desc;

    const rect = card.getBoundingClientRect();
    const clone = card.cloneNode(true);
    clone.classList.add("clone-iu");
    clone.style.position = "absolute";
    clone.style.left = rect.left + "px";
    clone.style.top = rect.top + "px";
    clone.style.width = rect.width + "px";
    clone.style.height = rect.height + "px";
    clone.style.transition = "all 0.5s ease";
    clone.style.zIndex = 1000;

    document.querySelector(".product-slider-wrapper-iu").appendChild(clone);

    card.style.opacity = 0;
    carousel.classList.add("blurred-iu");

    setTimeout(() => {
      if (isMobile) {
        clone.style.width = "90vw";
        clone.style.height = "90vw";
      } else {
        clone.style.width = "90vw";
        clone.style.height = "90vw";
        clone.style.maxWidth = "500px";
        clone.style.maxHeight = "500px";
      }
      clone.style.left = `50%`;
      clone.style.top = `50%`;
      clone.style.transform = `translate(-50%, -50%) rotateY(0deg)`;
    }, 10);

    setTimeout(() => {
      details.classList.add("visible-iu");
      closeBtn.classList.add("visible-iu");
    }, 600);

    card.clone = clone;
  }

  function closeCard() {
    if (!expanded) return;

    details.classList.remove("visible-iu");
    closeBtn.classList.remove("visible-iu");

    const card = expanded;
    const clone = card.clone;
    const rect = card.getBoundingClientRect();

    clone.style.transition = "all 0.5s ease";
    clone.style.width = card.offsetWidth + "px";
    clone.style.height = card.offsetHeight + "px";
    clone.style.left = rect.left + "px";
    clone.style.top = rect.top + "px";
    clone.style.transform = "rotateY(0deg)";

    carousel.classList.remove("blurred-iu");

    card.style.opacity = 1;

    setTimeout(() => {
      clone.remove();
      expanded = null;
    }, 500);
  }

  function rotate(direction) {
    if (expanded) return;
    if (direction === "next") {
      const first = cards.shift();
      cards.push(first);
      carousel.appendChild(first);
    } else {
      const last = cards.pop();
      cards.unshift(last);
      carousel.prepend(last);
    }
    applyPositions();
  }

  container.addEventListener("mousedown", e => {
    if (expanded) return;
    dragging = true;
    startX = e.clientX;
  });

  document.addEventListener("mouseup", () => dragging = false);

  document.addEventListener("mousemove", e => {
    if (!dragging || expanded) return;
    dragDistance = e.clientX - startX;
    if (Math.abs(dragDistance) > threshold) {
      rotate(dragDistance > 0 ? "prev" : "next");
      startX = e.clientX;
    }
  });

  container.addEventListener("touchstart", e => {
    if (expanded) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isHorizontalSwipe = false;
    dragging = true;
  }, { passive: true });

  container.addEventListener("touchmove", e => {
    if (!dragging || expanded) return;
    const diffX = e.touches[0].clientX - startX;
    const diffY = e.touches[0].clientY - startY;

    if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > threshold / 2) { 
      e.preventDefault();
      isHorizontalSwipe = true;
      rotate(diffX > 0 ? "prev" : "next");
      startX = e.touches[0].clientX;
    }
  }, { passive: false });

  container.addEventListener("touchend", () => dragging = false);

  cards.forEach(card => {
    card.addEventListener("click", () => {
      if (expanded || dragging || isHorizontalSwipe) return;
      expandCard(card);
    });
  });

  document.addEventListener("mouseup", () => {
    dragging = false;
    isHorizontalSwipe = false;
  });

  container.addEventListener("touchend", () => {
    dragging = false;
    isHorizontalSwipe = false;
  });

  closeBtn.addEventListener("click", closeCard);
  document.addEventListener("click", e => {
    if (expanded && !e.target.closest(".clone-iu") && !e.target.closest(".product-details-iu") && !e.target.closest(".product-card-iu")) {
      closeCard();
    }
  });

  document.addEventListener("keydown", e => {
    if (e.key === "Escape") closeCard();
    if (e.key === "ArrowRight") rotate("next");
    if (e.key === "ArrowLeft") rotate("prev");
  });

  const video = document.querySelector(".video-wrapper-iu iframe");
  if (video) {
    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            video.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
          } else {
            video.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
          }
        });
      },
      { threshold: 0.6 }
    );
    observer.observe(video);
  }
});
</script>
