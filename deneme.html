<style type="text/css">
  .g-cont {

  .g-grid {

    margin-bottom: 20px;
  }
  /* Kutu padding 15px -> 20px oldu */

    position: relative;
    overflow: hidden;
  }
  .g-card:hover {

    transform: translateY(-4px) scale(1.02);
    background: #fff;
  }
  /* İkon yuvarlağı 38px -> 54px oldu */
  .g-icon {
    width: 54px;

    transition: 0.3s;
    border: 1px solid #253b484d;
  }
  .g-card:hover .g-icon {
