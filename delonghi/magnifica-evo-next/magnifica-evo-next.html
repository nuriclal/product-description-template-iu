<style>
  .section-iu {
    position: relative;
    width: 100%;
    display: flex;
    justify-content: center;
    background: #132440;
    padding: 60px 0;
    overflow: hidden;
  }

  .pattern-iu {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    display: grid;
    grid-template-columns: repeat(auto-fill, 80px);
    grid-auto-rows: 80px;
    gap: 20px;
    opacity: 0.12;
    z-index: 0;
    pointer-events: none;
    user-select: none;
  }

  .pattern-iu .p-iu {
    width: 48px;
    height: 48px;
    object-fit: contain;
    align-self: center;
    justify-self: center;
    -webkit-user-drag: none;
  }

  .galeri-iu {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
    padding: 20px;
    box-sizing: border-box;
    pointer-events: none;
  }

  .foto-iu {
    width: 80%;
    height: auto;
    max-width: 520px;
    -webkit-user-drag: none;
    user-select: none;
  }

  @media (max-width: 800px) {
    .foto-iu {
      width: 80%;
      max-width: 400px;
    }
    .pattern-iu {
      grid-template-columns: repeat(auto-fit, 60px);
      grid-auto-rows: 60px;
      justify-content: center; 
      align-content: start;
      place-items: center;
    }

    .pattern-iu .p-iu {
      width: 32px;
      height: 32px;
    }
}

@media (max-width: 390px) {
    .foto-iu {
      width: 80%;
      max-width: 400px;
    }
    .pattern-iu {
      grid-template-columns: repeat(auto-fit, 50px);
      grid-auto-rows: 50px;
      justify-content: center; 
      align-content: start;
      place-items: center;
    }

    .pattern-iu .p-iu {
      width: 32px;
      height: 32px;
    }
}

</style>

<section class="section-iu">
  <div class="pattern-iu" id="pattern" aria-hidden="true"></div>

  <div class="galeri-iu" oncontextmenu="return false;">
  <img class="foto-iu" src="/Content/UploadFiles/88f2e91b-1.jpg" /> 
  <img class="foto-iu" src="/Content/UploadFiles/5002bb51-2.jpg" /> 
  <img class="foto-iu" src="/Content/UploadFiles/0997a5b3-3.jpg" /> 
  <img class="foto-iu" src="/Content/UploadFiles/2ee3f9d7-4.jpg" /> 
  <img class="foto-iu" src="/Content/UploadFiles/4e574ee1-5.jpg" /> 
  <img class="foto-iu" src="/Content/UploadFiles/6e06329a-6.jpg" /> 
  <img class="foto-iu" src="/Content/UploadFiles/d0429b25-7.jpg" /> 
  <img class="foto-iu" src="/Content/UploadFiles/b3638a88-8.jpg" /> 
  <img class="foto-iu" src="/Content/UploadFiles/437ec77c-9.jpg" />
  </div>
</section>

<script>
(function(){
  const pattern = document.getElementById('pattern');
  const section = document.querySelector('.section-iu');

  const iconPaths = [
    "/Content/UploadFiles/f0e43b9e-1.png","/Content/UploadFiles/ce8fe5be-2.png",
    "/Content/UploadFiles/885e7b6e-3.png","/Content/UploadFiles/23cda84b-4.png",
    "/Content/UploadFiles/5005a3d2-5.png","/Content/UploadFiles/25e35e99-6.png",
    "/Content/UploadFiles/2d43dd0c-7.png","/Content/UploadFiles/c15f068e-8.png",
    "/Content/UploadFiles/f78dcd57-9.png","/Content/UploadFiles/2f1c2e53-10.png",
    "/Content/UploadFiles/642e6cd5-11.png","/Content/UploadFiles/1d5b0131-12.png"
  ];

  let cellSize = 100; 

  function clearPattern() {
    while (pattern.firstChild) pattern.removeChild(pattern.firstChild);
  }

  function fillPattern() {
    clearPattern();

    cellSize = window.innerWidth <= 800 ? 60 : 100;

    const height = section.offsetHeight; 
    const width  = section.clientWidth;

    const rows = Math.ceil(height / cellSize) + 2;
    const cols = Math.ceil(width / cellSize) + 2;

    const count = rows * cols;
    for (let i = 0; i < count; i++) {
      const img = document.createElement('img');
      const src = iconPaths[Math.floor(Math.random() * iconPaths.length)];
      img.src = src;
      img.className = 'p-iu';
      img.alt = '';
      pattern.appendChild(img);
    }
  }

  let raf = null;
  function scheduleFill() {
    if (raf) cancelAnimationFrame(raf);
    raf = requestAnimationFrame(() => {
      fillPattern();
      raf = null;
    });
  }

  document.addEventListener('DOMContentLoaded', scheduleFill);
  window.addEventListener('load', scheduleFill);
  window.addEventListener('resize', scheduleFill);

  const ro = new ResizeObserver(scheduleFill);
  ro.observe(section);

  window.addEventListener('scroll', () => {
    const rect = section.getBoundingClientRect();
    const visible = rect.top < window.innerHeight && rect.bottom > 0;
    if (visible) scheduleFill();
  }, { passive: true });
})();
</script>
