<div><style>
.custom-body {
  display: flex;
  justify-content: center;
  align-items: center;
  color: #fff;
}

.custom-panel {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.custom-gauge {
  position: relative;
  width: 240px;
  height: 240px;
  border-radius: 50%;
  border: 4px solid #333; 
  margin-bottom: 25px;
  background: conic-gradient(
    #444 0deg 57.6deg,
    #444 57.6deg 115.2deg,
    #444 115.2deg 172.8deg,
    #444 172.8deg 230.4deg,
    #444 230.4deg 288deg,
    transparent 288deg 360deg
  );
  transform: rotate(-144deg);
}

.custom-inner-gauge {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 160px;  
  height: 160px;
  border-radius: 50%;
  background: linear-gradient(100deg, #000000, #684532);
  border: 4px solid #333; 
}

.custom-mode-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(144deg);
  color: #fff;
  font-size: 24px;
  font-weight: bold;
  pointer-events: none;
}

.custom-btn {
  background: #222;
  border-radius: 8px;
  padding: 8px 16px;
  font-size: 14px;
  user-select: none;
  cursor: pointer;
  border: 1px solid #333;
  transition: background 0.2s;
  color: #fff;
}

.custom-btn:hover {
  background: #333;
}
</style>

<div class="custom-body">
  <div class="custom-panel">
    <div class="custom-gauge" id="custom-gauge">
      <div class="custom-inner-gauge"></div>
      <div class="custom-mode-text" id="custom-mode-text">Auto</div>
    </div>
    <div class="custom-btn" id="custom-auto-btn">AUTO</div>
  </div>
</div>

<script>
const customGauge = document.getElementById("custom-gauge");
const customAutoBtn = document.getElementById("custom-auto-btn");
const customModeText = document.getElementById("custom-mode-text");

const modes = [
  { name: "Auto", color: "#007bff", start: 0, end: 57.6 },
  { name: "Eco", color: "#28a745", start: 57.6, end: 115.2 },
  { name: "Eco+", color: "#1b5e20", start: 115.2, end: 172.8 },
  { name: "Max", color: "#ff9800", start: 172.8, end: 230.4 },
  { name: "Boost", color: "#f44336", start: 230.4, end: 288 }
];

let current = 0;
let autoTimer = null;
const intervalTime = 3000;

function updateGauge() {
  let gradient = "";
  modes.forEach((m, i) => {
    const color = (i === current) ? m.color : "#000000";
    gradient += `${color} ${m.start}deg ${m.end}deg, `;
  });
  gradient += "transparent 288deg 360deg";
  customGauge.style.background = `conic-gradient(${gradient})`;
  customModeText.textContent = modes[current].name;
  customModeText.style.color = modes[current].color;
}

function startAutoCycle() {
  if (autoTimer) clearInterval(autoTimer);

  autoTimer = setInterval(() => {
    current = (current + 1) % modes.length;
    updateGauge();
  }, intervalTime);
}

customAutoBtn.addEventListener("click", () => {
  current = (current + 1) % modes.length;
  updateGauge();
  startAutoCycle(); 
});

updateGauge();
startAutoCycle();
</script>
</div>
